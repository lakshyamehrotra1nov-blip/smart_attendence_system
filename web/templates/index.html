<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Attendance Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <!-- Toastify JS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="particles-js"></div>
    <div class="container" style="position: relative; z-index: 10;">
        <header>
            <h1>Ultra-Advanced Attendance System</h1>
            <p>Real-time face scanning with Voice AI & anti-spoof protection.</p>
        </header>
        
        <div class="stats-row">
            <div class="glass-card stat-box">
                <div class="stat-icon">👥</div>
                <div class="stat-info">
                    <h3>Total Present Today</h3>
                    <p id="total-present">0</p>
                </div>
            </div>
            <div class="glass-card stat-box">
                <div class="stat-icon">⏱️</div>
                <div class="stat-info">
                    <h3>Last Scan Time</h3>
                    <p id="last-scan">--:--:--</p>
                </div>
            </div>
            <div class="glass-card stat-box" style="justify-content: center;">
                <button onclick="window.location.href='/api/export/csv'" style="display: flex; align-items: center; gap: 0.5rem; justify-content: center;">
                    📥 Download CSV Report
                </button>
            </div>
        </div>

        <div class="main-grid">
            <div class="video-section">
                <div class="glass-card">
                    <h2>🎥 Live Camera Feed</h2>
                    <div class="video-container">
                        <img src="/video_feed" alt="Video Feed">
                    </div>
                </div>
                
                <div class="glass-card chart-container">
                    <h2>📈 Attendance Activity</h2>
                    <canvas id="attendanceChart"></canvas>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="glass-card">
                    <h2>📝 Register New Profile</h2>
                    <form id="register-form" onsubmit="registerStudent(event)">
                        <div class="form-group">
                            <input type="text" id="student_name" placeholder="Student Name" required>
                        </div>
                        <div class="form-group">
                            <input type="file" id="student_image" accept="image/*">
                        </div>
                        <div style="display: flex; gap: 0.5rem;">
                            <button type="submit" style="flex: 1;">Upload Photo</button>
                            <button type="button" onclick="captureAndRegister()" style="flex: 1; background: #10b981;">📸 Capture Live</button>
                        </div>
                    </form>
                </div>
                <br>
                <div class="glass-card">
                    <h2>👥 Registered Profiles</h2>
                    <div class="table-wrapper" style="max-height: 200px;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="profiles-tbody">
                                <!-- Populated via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
                <br>
                <div class="glass-card">
                    <h2>✅ Today's Attendance</h2>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Time</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="attendance-tbody">
                                <!-- Populated via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let attendanceData = [];
        let chartInstance = null;

        // Initialize Particles.js
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#60a5fa" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": false },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#3b82f6", "opacity": 0.4, "width": 1 },
                "move": { "enable": true, "speed": 2, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "grab" },
                    "onclick": { "enable": true, "mode": "push" },
                    "resize": true
                },
                "modes": {
                    "grab": { "distance": 140, "line_linked": { "opacity": 1 } },
                    "push": { "particles_nb": 4 }
                }
            },
            "retina_detect": true
        });

        function playVoiceTTS(name) {
            if ('speechSynthesis' in window) {
                const msg = new SpeechSynthesisUtterance();
                msg.text = "Welcome, " + name + ". Attendance logged successfully.";
                msg.volume = 1; // 0 to 1
                msg.rate = 1; // 0.1 to 10
                msg.pitch = 1; // 0 to 2
                
                // Try to find a good English voice
                const voices = window.speechSynthesis.getVoices();
                const engVoice = voices.find(v => v.lang.includes('en'));
                if (engVoice) msg.voice = engVoice;

                window.speechSynthesis.speak(msg);
            }
        }

        function showToast(message, isError=false) {
            Toastify({
                text: message,
                duration: 3000,
                close: true,
                gravity: "top", 
                position: "right",
                style: {
                    background: isError ? "linear-gradient(to right, #ef4444, #f87171)" : "linear-gradient(to right, #10b981, #34d399)",
                    borderRadius: "10px",
                    boxShadow: "0 4px 12px rgba(0,0,0,0.15)"
                }
            }).showToast();
        }

        // Initialize Chart
        function initChart() {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Check-ins',
                        data: [],
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.2)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, ticks: { stepSize: 1, color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                        x: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function updateUI(records) {
            const tbody = document.getElementById('attendance-tbody');
            tbody.innerHTML = '';
            
            document.getElementById('total-present').innerText = records.length;
            
            if (records.length > 0) {
                document.getElementById('last-scan').innerText = records[records.length - 1].time;
            }
            
            let times = {};

            records.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${r.student_name}</td>
                    <td>${r.time}</td>
                    <td><span class="badge">Present</span></td>
                `;
                tbody.appendChild(tr);
                
                let hour = r.time.substring(0, 2) + ":00";
                times[hour] = (times[hour] || 0) + 1;
            });
            
            if (chartInstance) {
                chartInstance.data.labels = Object.keys(times);
                chartInstance.data.datasets[0].data = Object.values(times);
                chartInstance.update();
            }
        }

        async function fetchAttendance() {
            try {
                const res = await fetch('/api/attendance');
                const data = await res.json();
                attendanceData = data.attendance || [];
                updateUI(attendanceData);
            } catch (err) {
                console.error("Failed to load attendance", err);
            }
        }

        async function fetchProfiles() {
            try {
                const res = await fetch('/api/students');
                const data = await res.json();
                const tbody = document.getElementById('profiles-tbody');
                tbody.innerHTML = '';
                
                (data.students || []).forEach(student => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${student.name}</td>
                        <td>
                            <button onclick="deleteProfile(${student.id}, '${student.name}')" style="background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; padding: 0.2rem 0.5rem; font-size: 0.8rem;">
                                Delete
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error("Failed to load profiles", err);
            }
        }

        async function deleteProfile(id, name) {
            if (!confirm(`Are you sure you want to permanently delete the profile for ${name}?`)) return;
            
            try {
                const res = await fetch(`/api/students/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (res.ok) {
                    showToast(data.message, false);
                    fetchProfiles(); // Refresh the list
                    fetchAttendance(); // Refresh attendance just in case
                } else {
                    showToast(data.detail || "Failed to delete", true);
                }
            } catch (err) {
                showToast("Failed to communicate with server.", true);
            }
        }

        async function registerStudent(e) {
            e.preventDefault();
            
            const name = document.getElementById('student_name').value;
            const file = document.getElementById('student_image').files[0];
            
            if (!file) {
                showToast("Please select a file, or use 'Capture Live' instead.", true);
                return;
            }
            
            const formData = new FormData();
            formData.append("name", name);
            formData.append("file", file);
            
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.error) {
                    showToast(data.error, true);
                } else {
                    showToast(data.message, false);
                    document.getElementById('register-form').reset();
                }
            } catch (err) {
                showToast("Failed to communicate with server.", true);
            }
        }

        async function captureAndRegister() {
            const name = document.getElementById('student_name').value;
            
            if (!name) {
                showToast("Please enter a Student Name first.", true);
                return;
            }
            
            const formData = new FormData();
            formData.append("name", name);
            
            try {
                const res = await fetch('/api/register_live', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.error) {
                    showToast(data.error, true);
                } else {
                    showToast(data.message, false);
                    document.getElementById('register-form').reset();
                }
            } catch (err) {
                showToast("Failed to communicate with server.", true);
            }
        }

        // WebSockets Setup
        function setupWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            const ws = new WebSocket(wsUrl);

            ws.onmessage = function(event) {
                const record = JSON.parse(event.data);
                
                const exists = attendanceData.find(r => r.student_name === record.student_name);
                if (!exists) {
                    attendanceData.push(record);
                    updateUI(attendanceData);
                    
                    // Trigger Voice & Toast
                    playVoiceTTS(record.student_name);
                    showToast(`${record.student_name} was just logged!`, false);
                    
                    const rows = document.querySelectorAll('#attendance-tbody tr');
                    if (rows.length > 0) {
                        rows[rows.length - 1].classList.add('new-record');
                        setTimeout(() => {
                            rows[rows.length - 1].classList.remove('new-record');
                        }, 2000);
                    }
                }
            };

            ws.onclose = function() {
                console.log("WebSocket disconnected. Reconnecting in 5s...");
                setTimeout(setupWebSocket, 5000);
            };
        }

        // Load voices early
        window.speechSynthesis.onvoiceschanged = function() {
            window.speechSynthesis.getVoices();
        };

        window.onload = () => {
            initChart();
            fetchProfiles();
            fetchAttendance();
            setupWebSocket();
        };
    </script>
</body>
</html>
