<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Advanced Attendance Dashboard</h1>
        </header>

        <div class="main-content">
            <!-- Video Feed Section -->
            <div class="video-section card">
                <h2>Live Camera Feed</h2>
                <div class="video-container">
                    <img src="/video_feed" alt="Video Feed" id="video-stream">
                </div>
            </div>

            <!-- Dashboard Sidebar -->
            <div class="sidebar">
                <!-- Registration Card -->
                <div class="card">
                    <h2>Register New Student</h2>
                    <form id="register-form" enctype="multipart/form-data">
                        <input type="text" id="student_name" name="name" placeholder="Enter Student Name" required>
                        <input type="file" id="student_image" name="file" accept="image/*" required>
                        <button type="submit">Register Face</button>
                    </form>
                    <div id="register-msg"></div>
                </div>

                <!-- Today's Attendance List -->
                <div class="card attendance-card">
                    <h2>Today's Attendance</h2>
                    <table id="attendance-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Time</th>
                                <th>Confidence</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Filled dynamically by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Fetch Attendance Data
        async function fetchAttendance() {
            try {
                const response = await fetch('/api/attendance');
                const data = await response.json();
                
                const tbody = document.querySelector('#attendance-table tbody');
                tbody.innerHTML = '';
                
                data.attendance.forEach(record => {
                    const row = `<tr>
                        <td>${record.student_name}</td>
                        <td>${record.time}</td>
                        <td><span class="badge">${record.confidence * 100}%</span></td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            } catch (err) {
                console.error("Error fetching attendance:", err);
            }
        }

        // Poll every 2 seconds
        setInterval(fetchAttendance, 2000);
        fetchAttendance();

        // Handle Form Submission
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgDiv = document.getElementById('register-msg');
            msgDiv.innerHTML = "Processing...";
            
            const formData = new FormData(e.target);
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    body: formData
                });
                const result = await res.json();
                if(result.error) {
                    msgDiv.innerHTML = `<span style="color:red">${result.error}</span>`;
                } else {
                    msgDiv.innerHTML = `<span style="color:green">${result.message}</span>`;
                    e.target.reset();
                }
            } catch (err) {
                msgDiv.innerHTML = `<span style="color:red">Upload failed.</span>`;
            }
        });
    </script>
</body>
</html>
